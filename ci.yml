name: Underwriting Engine CI

# Runs automatically on every push or pull request to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic pandas pytest pytest-cov flake8

      - name: Lint
        run: flake8 underwriting_engine.py --max-line-length=100 --extend-ignore=E501

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v --cov=underwriting_engine --cov-report=term-missing

      # This is the CI/CD "gate": if any test above fails, this job fails,
      # and (in a real deploy setup) the pipeline would stop here — nothing
      # broken ever reaches production.
